<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Circle -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#greenGlow)" stroke-width="4" filter="url(#glow)" />
  
  <!-- Inner Elements -->
  <g filter="url(#glow)">
    <!-- BulSU Building Silhouette -->
    <path d="M70 120 L70 80 L85 65 L115 65 L130 80 L130 120 Z" fill="none" stroke="url(#greenGlow)" stroke-width="3" />
    
    <!-- Windows -->
    <rect x="80" y="75" width="10" height="10" fill="url(#greenGlow)" opacity="0.8" />
    <rect x="110" y="75" width="10" height="10" fill="url(#greenGlow)" opacity="0.8" />
    <rect x="80" y="95" width="10" height="10" fill="url(#greenGlow)" opacity="0.8" />
    <rect x="110" y="95" width="10" height="10" fill="url(#greenGlow)" opacity="0.8" />
    
    <!-- Door -->
    <rect x="95" y="100" width="10" height="20" fill="url(#greenGlow)" opacity="0.9" />
    
    <!-- Orbit Rings -->
    <ellipse cx="100" cy="100" rx="70" ry="30" fill="none" stroke="url(#greenGlow)" stroke-width="1.5" opacity="0.6" />
    <ellipse cx="100" cy="100" rx="30" ry="70" fill="none" stroke="url(#greenGlow)" stroke-width="1.5" opacity="0.6" />
    
    <!-- Stars/Nodes -->
    <circle cx="100" cy="30" r="4" fill="url(#greenGlow)" />
    <circle cx="100" cy="170" r="4" fill="url(#greenGlow)" />
    <circle cx="30" cy="100" r="4" fill="url(#greenGlow)" />
    <circle cx="170" cy="100" r="4" fill="url(#greenGlow)" />
    <circle cx="150" cy="50" r="3" fill="url(#greenGlow)" />
    <circle cx="50" cy="150" r="3" fill="url(#greenGlow)" />
    <circle cx="150" cy="150" r="3" fill="url(#greenGlow)" />
    <circle cx="50" cy="50" r="3" fill="url(#greenGlow)" />
  </g>
  
  <!-- Text Elements -->
  <text x="100" y="145" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="white" text-anchor="middle">BULSU SPACE</text>
</svg>
