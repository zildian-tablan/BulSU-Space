<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/images/bulsu-space-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#111827" />
    <meta
      name="description"
      content="Academic Community Social Platform for Bulacan State University - Hagonoy Campus"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <!-- Material Symbols (Outlined) for new glyphs like note_stack -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0" rel="stylesheet" />
    <title>BulSU Space</title>
    <style> 
      /* Force dark theme styling with !important flags */
      html, body {
        background-color: #111827 !important;
        color: #f3f4f6 !important;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
      }
      
      /* Mobile scrollbar hiding */
      @media (max-width: 640px) {
        * {
          scrollbar-width: none !important;
          -ms-overflow-style: none !important;
        }
        
        *::-webkit-scrollbar {
          display: none !important;
          width: 0 !important;
          height: 0 !important;
        }
      }
      
      /* Apply basic component styling directly */
      a { color: #10B981 !important; text-decoration: none !important; }
      a:hover { color: #059669 !important; }
      
      button { 
        color: white !important; 
        border-radius: 0.375rem !important;
        border: none !important;
        padding: 0.5rem 1rem !important;
      }
      
      input, select, textarea {
        background-color: #1f2937 !important;
        border: 1px solid #374151 !important;
        color: #e5e7eb !important;
        border-radius: 0.375rem !important;
        padding: 0.5rem 0.75rem !important;
      }
      
      /* Force modern card styling */
      div {
        border-radius: 0.375rem;
      }
      
      /* Emergency style injection to ensure styling works */
      #root * {
        transition: all 0.2s;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- Style enforcement script -->
    <script>
      // Force dark theme with green accents after DOM loads
      document.addEventListener('DOMContentLoaded', function() {
        // Add dark class to html element
        document.documentElement.classList.add('dark');
        
        // Apply some direct styles to ensure dark theme with green accents
        document.body.style.backgroundColor = '#111827';
        document.body.style.color = '#f3f4f6';
        
        // Apply styles to all buttons
        document.querySelectorAll('button').forEach(button => {
          if (!button.classList.contains('btn-secondary')) {
            button.style.color = 'white';
          }
        });
        
        // Apply styles to all inputs
        document.querySelectorAll('input, select, textarea').forEach(input => {
          input.style.backgroundColor = '#1f2937';
          input.style.borderColor = '#374151';
          input.style.color = '#e5e7eb';
        });
        
        // Apply green color to all links
        document.querySelectorAll('a').forEach(link => {
          link.style.color = '#10B981';
        });
      });
    </script>
  </body>
</html>
